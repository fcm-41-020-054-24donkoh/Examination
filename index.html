<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Experience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
      // Optimized Water Shader
      AFRAME.registerShader('natural-water', {
        schema: {
          color: {type: 'color', is: 'uniform', default: '#00aaff'},
          opacity: {type: 'number', is: 'uniform', default: 0.7},
          time: {type: 'time', is: 'uniform'}
        },
        vertexShader: `
          varying vec2 vUv;
          uniform float time;
          void main() {
            vUv = uv;
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);
            float elevation = sin(modelPosition.x * 1.5 + time / 400.0) * 0.08;
            elevation += sin(modelPosition.z * 1.2 + time / 500.0) * 0.06;
            modelPosition.y += elevation;
            gl_Position = projectionMatrix * viewMatrix * modelPosition;
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform vec3 color;
          uniform float opacity;
          void main() {
            gl_FragColor = vec4(color, opacity);
          }
        `
      });
    </script>
    <style>
      .loading-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-content { text-align: center; color: #fff; font-family: Arial, sans-serif; }
      .loading-spinner {
        width: 50px; height: 50px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: #00d4ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <h2>Loading VR Experience...</h2>
      </div>
    </div>

    <a-scene shadow="type: basic" renderer="antialias: false; colorManagement: true; physicallyCorrectLights: false">

      <!-- Assets -->
      <a-assets>
        <img id="sky-texture" src="assets/blue-cloudy-sky-texture_9942048.jpg">
      </a-assets>

      <!-- Sky with clear blue color -->
      <a-sky id="sky" color="#0077be"></a-sky>

      <!-- Lighting -->
      <a-light id="sun-light" type="directional" intensity="1" position="4 10 2" castShadow="false"></a-light>
      <a-light id="ambient-light" type="ambient" intensity="0.6"></a-light>

      <!-- Ground -->
      <a-plane id="ground" position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#228B22"></a-plane>

      <!-- Modern Dream House -->
      <a-entity id="house" position="-10 0 0" scale="1 1 1" rotation="0 0 0"
                gltf-model="models/modern_dream_house.glb"></a-entity>

      <!-- Trees (front corners) -->
      <a-entity id="tree-left" position="-20 0 15" scale="0.167 0.167 0.167" rotation="0 0 0"
                gltf-model="models/tree_s3.glb"></a-entity>
      <a-entity id="tree-right" position="35 0 15" scale="0.167 0.167 0.167" rotation="0 0 0"
                gltf-model="models/tree_s3.glb"></a-entity>

      <!-- Flower Pathway (scattered around the scene) -->
      <a-entity id="flower-path-1" position="-18.10255 0 25" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>
      <a-entity id="flower-path-2" position="6.58068 0 22" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>
      <a-entity id="flower-path-3" position="1.1121 0 19" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>
      <a-entity id="flower-path-4" position="26.67902 0 16" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>
      <a-entity id="flower-path-5" position="-21.91647 0 -29.14654" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>
      <a-entity id="flower-path-6" position="4.98583 0 -9.71445" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>
      <a-entity id="flower-path-10" position="-27.04033 0 -2" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>
      <a-entity id="flower-path-11" position="-18.94492 0 31.57357" scale="0.02 0.02 0.02" rotation="0 0 0"
                gltf-model="models/purple_flower.glb"></a-entity>

      <!-- Modern Garage -->
      <a-entity id="garage" position="19.70936 -0.14328 7.21714" scale="1 1 0.6" rotation="0 180 0"
                gltf-model="models/modern_garage.glb"></a-entity>

      <!-- Honda Civics (in front of garage) -->
      <a-entity id="honda-civic" position="-14.692 0.66799 16.332" scale="1.5 1.5 1.5" rotation="0 1.8610000000000002 0"
                gltf-model="models/honda_civic_type-r.glb"></a-entity>
      <a-entity id="modified-honda" position="20.20404 -0.07539 14.241" scale="1 1 1" rotation="0 -143.13230567501634 0"
                gltf-model="models/modified_honda_civic.glb"></a-entity>

      <!-- Cartoon Pond -->
      <a-entity id="pond" position="10.874 -0.14108 -25.27291" scale="0.33 0.33 0.33" rotation="0 0 0"
                gltf-model="models/cartoon_pond.glb"></a-entity>

      <!-- Deck Chairs (by the pool) -->
      <a-entity id="deck-chair-1" position="9.24625 -0.07149 3" scale="3 3 3" rotation="2.689463890344084 166.9026057216088 2.691755721524608"
                gltf-model="models/deck_chair.glb"></a-entity>
      
      <!-- Decorative Model (between chairs) -->
      <a-entity id="decor-model" position="9.47 0.5 0.66" scale="4 4 4" rotation="0 0 0"
                gltf-model="models/85d4443d603c420aab9c8968433498d4.glb"></a-entity>
      
      <a-entity id="deck-chair-2" position="9.69817 0.14292 -1.67968" scale="3 3 3" rotation="0 169.29413155848488 0"
                gltf-model="models/deck_chair.glb"></a-entity>

      <!-- Basketball Court -->
      <a-entity id="basketball-court" position="-10 0 -20" scale="0.083 0.083 0.083" rotation="0 0 0"
                gltf-model="models/basketball_court_full.glb"></a-entity>

      <!-- Coconut Palms (around the scene - optimized) -->
      <!-- Far Left -->
      <a-entity id="palm-1" position="-25 0 10" scale="1 1 1" rotation="0 20 0"
                gltf-model="models/coconut_palm.glb"></a-entity>
      <a-entity id="palm-2" position="-25 0 -10" scale="1 1 1" rotation="0 -30 0"
                gltf-model="models/coconut_palm.glb"></a-entity>
      
      <!-- Far Right -->
      <a-entity id="palm-3" position="30.12412 0 15" scale="1 1 1" rotation="0 45 0"
                gltf-model="models/coconut_palm.glb"></a-entity>
      <a-entity id="palm-4" position="31.48649 0 0" scale="1 1 1" rotation="0 180 0"
                gltf-model="models/coconut_palm.glb"></a-entity>
      
      <!-- Back -->
      <a-entity id="palm-5" position="0 0 -35" scale="1 1 1" rotation="0 90 0"
                gltf-model="models/coconut_palm.glb"></a-entity>

      <!-- Lamps (front and back of scene) -->
      <!-- Front of Scene -->
      <a-entity id="lamp-1" position="-14.16957 0 18.66937" scale="1 1 1" rotation="0 0 0"
                gltf-model="models/lamp.glb"></a-entity>
      <a-entity id="lamp-2" position="2.8255 0 22.67595" scale="1 1 1" rotation="0 0 0"
                gltf-model="models/lamp.glb"></a-entity>
      <a-entity id="lamp-3" position="26.496 0.09452 19.58335" scale="1 1 1" rotation="0 0 0"
                gltf-model="models/lamp.glb"></a-entity>
      <!-- Back of Scene -->
      <a-entity id="lamp-4" position="-20 0 -40" scale="1 1 1" rotation="0 0 0"
                gltf-model="models/lamp.glb"></a-entity>
      <a-entity id="lamp-5" position="0 0 -45" scale="1 1 1" rotation="0 0 0"
                gltf-model="models/lamp.glb"></a-entity>
      <a-entity id="lamp-6" position="20 0 -40" scale="1 1 1" rotation="0 0 0"
                gltf-model="models/lamp.glb"></a-entity>

      <!-- THE SUNKEN POOL -->
      <a-entity id="pool" position="4 0.5 0" scale="0.6 0.6 0.6">
        <!-- Pool Shell -->
        <a-plane id="pool-floor" position="0 -2 0" rotation="-90 0 0" width="10" height="10" color="#006699" material="roughness: 0.1; metalness: 0.2"></a-plane>
        <a-plane id="pool-wall-back" position="0 -1 -5" rotation="0 0 0" width="10" height="2" color="#005588"></a-plane>
        <a-plane id="pool-wall-front" position="0 -1 5" rotation="0 180 0" width="10" height="2" color="#005588"></a-plane>
        <a-plane id="pool-wall-left" position="-5 -1 0" rotation="0 90 0" width="10" height="2" color="#005588"></a-plane>
        <a-plane id="pool-wall-right" position="5 -1 0" rotation="0 -90 0" width="10" height="2" color="#005588"></a-plane>

        <!-- WATER SURFACE -->
        <a-entity id="waterBody"
                  geometry="primitive: plane; width: 10; height: 10; segmentsWidth: 30; segmentsHeight: 30"
                  rotation="-90 0 0"
                  position="0 -0.4 0"
                  material="shader: natural-water; color: #1fb3ff; opacity: 0.75; transparent: true; side: double;">
        </a-entity>

        <!-- Pool Walls (white, solid) -->
        <a-box id="pool-edge-back" position="0 -0.5 -5" width="10" height="1" depth="0.3" color="#ffffff"></a-box>
        <a-box id="pool-edge-front" position="0 -0.5 5" width="10" height="1" depth="0.3" color="#ffffff"></a-box>
        <a-box id="pool-edge-left" position="-5 -0.5 0" width="0.3" height="1" depth="10" color="#ffffff"></a-box>
        <a-box id="pool-edge-right" position="5 -0.5 0" width="0.3" height="1" depth="10" color="#ffffff"></a-box>

        <!-- FLOATIES GROUP (Animated to bob with waves) -->
        <a-entity id="floaties-group" position="0 -0.3 0" animation="property: position; to: 0 -0.25 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">

          <!-- RUBBER DUCKIE FAMILY -->
          <!-- Mama Duck -->
          <a-entity id="duck-mama" position="-2 0 1" rotation="0 45 0">
            <a-sphere id="duck-mama-body" color="#FFD700" radius="0.25" scale="1 0.8 1.2"></a-sphere>
            <a-sphere id="duck-mama-head" color="#FFD700" radius="0.18" position="0 0.25 0.2"></a-sphere>
            <a-cone id="duck-mama-beak" color="#FF8C00" radius-bottom="0.05" height="0.1" position="0 0.22 0.38" rotation="90 0 0"></a-cone>
            <a-sphere id="duck-mama-eye-left" color="black" radius="0.02" position="0.08 0.3 0.33"></a-sphere>
            <a-sphere id="duck-mama-eye-right" color="black" radius="0.02" position="-0.08 0.3 0.33"></a-sphere>
          </a-entity>

          <!-- Baby Duck 1 -->
          <a-entity id="duck-baby1" position="-2.4 0 1.6" rotation="0 20 0" scale="0.6 0.6 0.6">
            <a-sphere id="duck-baby1-body" color="#FFEA00" radius="0.25" scale="1 0.8 1.2"></a-sphere>
            <a-sphere id="duck-baby1-head" color="#FFEA00" radius="0.18" position="0 0.25 0.2"></a-sphere>
            <a-cone id="duck-baby1-beak" color="#FF8C00" radius-bottom="0.05" height="0.1" position="0 0.22 0.38" rotation="90 0 0"></a-cone>
            <a-sphere id="duck-baby1-eye-left" color="black" radius="0.02" position="0.08 0.3 0.33"></a-sphere>
            <a-sphere id="duck-baby1-eye-right" color="black" radius="0.02" position="-0.08 0.3 0.33"></a-sphere>
          </a-entity>

          <!-- Baby Duck 2 -->
          <a-entity id="duck-baby2" position="-1.6 0 1.6" rotation="0 70 0" scale="0.6 0.6 0.6">
            <a-sphere id="duck-baby2-body" color="#FFEA00" radius="0.25" scale="1 0.8 1.2"></a-sphere>
            <a-sphere id="duck-baby2-head" color="#FFEA00" radius="0.18" position="0 0.25 0.2"></a-sphere>
            <a-cone id="duck-baby2-beak" color="#FF8C00" radius-bottom="0.05" height="0.1" position="0 0.22 0.38" rotation="90 0 0"></a-cone>
            <a-sphere id="duck-baby2-eye-left" color="black" radius="0.02" position="0.08 0.3 0.33"></a-sphere>
            <a-sphere id="duck-baby2-eye-right" color="black" radius="0.02" position="-0.08 0.3 0.33"></a-sphere>
          </a-entity>

          <!-- PINK DONUT FLOATIE -->
          <a-entity id="donut1" position="2 0 -2" rotation="90 0 0">
            <a-torus id="donut1-ring" color="#FF69B4" radius="0.6" radius-tubular="0.15"></a-torus>
            <!-- Sprinkles -->
            <a-cylinder id="donut1-sprinkle1" color="#FFFFFF" radius="0.01" height="0.05" position="0.4 0.1 0.1" rotation="45 45 0"></a-cylinder>
            <a-cylinder id="donut1-sprinkle2" color="#00FFFF" radius="0.01" height="0.05" position="-0.3 0.15 -0.2" rotation="10 30 90"></a-cylinder>
          </a-entity>

          <!-- LIME GREEN RING FLOATIE -->
          <a-entity id="ring-green" position="-1.5 0 -3" rotation="85 20 0">
            <a-torus id="ring-green-torus" color="#32CD32" radius="0.8" radius-tubular="0.12"></a-torus>
          </a-entity>

          <!-- PURPLE RING FLOATIE -->
          <a-entity id="ring-purple" position="2.5 0 2.5" rotation="80 -10 0">
            <a-torus id="ring-purple-torus" color="#9370DB" radius="0.7" radius-tubular="0.13"></a-torus>
          </a-entity>

          <!-- BLUE LOUNGER FLOATIE -->
          <a-entity id="lounger" position="0 0 -1" rotation="0 -30 0">
            <!-- Base -->
            <a-box id="lounger-base" color="#00BFFF" width="0.8" height="0.1" depth="1.8" radius="0.05"></a-box>
            <!-- Headrest -->
            <a-box id="lounger-headrest" color="#00BFFF" width="0.8" height="0.2" depth="0.4" position="0 0.1 -0.7"></a-box>
          </a-entity>

          <!-- ORANGE BEACH BALL -->
          <a-sphere id="ball" position="3.5 0.2 0" radius="0.3" color="#FF4500"
                    animation="property: rotation; to: 0 360 0; dur: 4000; easing: linear; loop: true"></a-sphere>

        </a-entity>

      </a-entity>

      <!-- Camera -->
      <a-entity id="camera-rig" position="0 4 10" rotation="-20 0 0">
        <a-camera id="camera" look-controls wasd-controls="acceleration: 20"></a-camera>
      </a-entity>

    </a-scene>

    <script>
      // Hide loading screen when scene loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.getElementById('loadingScreen').classList.add('hidden');
        }, 1000);
      });
    </script>
  </body>
</html>
